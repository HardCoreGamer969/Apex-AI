name: Build Windows Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-desktop:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv run pip install pyinstaller

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build backend (PyInstaller)
        run: |
          uv run pyinstaller `
            desktop-backend/apex-ai-backend.spec `
            --distpath desktop-backend/dist `
            --workpath desktop-backend/build `
            --noconfirm

      - name: Install Electron dependencies
        working-directory: desktop
        run: npm ci

      - name: Package with electron-builder
        working-directory: desktop
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ApexAI-Windows-Setup
          path: desktop/dist/ApexAI*.exe
          retention-days: 30
