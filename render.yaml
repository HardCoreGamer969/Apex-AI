# Render.com deployment config for ApexAI backend
# Uses uv for fast, reproducible dependency installation
services:
  - type: web
    name: apex-ai-api
    runtime: python
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn backend.main:app --host 0.0.0.0 --port $PORT --no-access-log --timeout-keep-alive 5
    envVars:
      - key: MPLBACKEND
        value: "Agg"  # Non-GUI matplotlib backend (saves memory)
      - key: MPLCONFIGDIR
        value: "/tmp/mpl"  # Avoid font cache in home dir
      - key: CORS_ORIGINS
        sync: false  # Set in Render dashboard to your Vercel frontend URL(s)
      - key: SUPABASE_URL
        sync: false  # Optional: Supabase project URL for replay caching
      - key: SUPABASE_SERVICE_KEY
        sync: false  # Optional: Supabase service role key for storage access
      - key: CACHE_MAX_SESSIONS
        value: "50"  # Max cached replay files in Supabase Storage
      - key: ADMIN_SECRET
        sync: false  # Secret for /admin/* endpoints (set in Render dashboard)
